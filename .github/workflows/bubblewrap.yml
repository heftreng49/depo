name: Build Bubblewrap APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Daha kararlı bir sürüm olan LTS kullanıyoruz

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure and Build
        run: |
          # 1. Bubblewrap yapılandırmasını oluştur
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"/home/runner/android-sdk\"}" > ~/.bubblewrap/config.json
          
          # 2. Doğrudan sitenin URL'sini hedef alıyoruz. 
          # Bu sayede 'Invalid URL' hatası almazsın çünkü domain bellidir.
          # Soru sormaması için 'yes' komutuyla cevapları önceden gönderiyoruz.
          yes | bubblewrap init --url https://heft-reng.blogspot.com --yes
          
          # 3. Android SDK ve lisans onaylarını sessizce hallet
          yes | bubblewrap doctor || true
          
          # 4. APK'yı oluştur (İmzalama aşamasını atlıyoruz)
          bubblewrap build --skipSigning

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HeftReng-Native-APK
          path: ./*.apk
