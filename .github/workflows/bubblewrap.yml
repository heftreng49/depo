name: Build Bubblewrap APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure and Build
        run: |
          # 1. Bubblewrap ayarlarını önceden oluştur
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"/home/runner/android-sdk\"}" > ~/.bubblewrap/config.json
          
          # 2. Manifest dosyasını yerel olarak indir (Domain karmaşasını engellemek için)
          curl -sL https://raw.githubusercontent.com/heftreng49/depo/refs/heads/master/manifest.json -o local_manifest.json
          
          # 3. Projeyi başlat (Tüm sorulara boru hattıyla peşin cevap veriyoruz)
          # Domain ve Path sorularına doğrudan cevap gönderiyoruz
          printf "heft-reng.blogspot.com\n/\n" | bubblewrap init --manifest ./local_manifest.json --yes
          
          # 4. Android SDK kurulumunu sessizce onayla
          yes | bubblewrap doctor || true
          
          # 5. APK'yı derle
          bubblewrap build --skipSigning

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HeftReng-Native-APK
          path: ./*.apk
