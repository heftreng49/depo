name: Build Bubblewrap APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure and Build
        run: |
          # 1. Bubblewrap yapılandırmasını oluştur
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"/home/runner/android-sdk\"}" > ~/.bubblewrap/config.json
          
          # 2. Projeyi başlat
          # --manifest: GitHub'daki dosyan
          # --host: Uygulamanın çalışacağı gerçek adres (Blogger)
          # --yes: Diğer sorulara varsayılan cevapları ver
          bubblewrap init --manifest https://raw.githubusercontent.com/heftreng49/depo/refs/heads/master/manifest.json \
                          --host heft-reng.blogspot.com \
                          --path / \
                          --yes
          
          # 3. Android SDK kurulumu ve lisansları (Hata alsa da devam etmesi için || true)
          yes | bubblewrap doctor || true
          
          # 4. APK'yı derle (İmzalama aşamasını atlıyoruz)
          bubblewrap build --skipSigning

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HeftReng-Native-APK
          path: ./*.apk
